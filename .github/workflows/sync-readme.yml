name: Sync README → All Files

on:
  push:
    paths:
      - 'README.md'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sync
        run: python3 scripts/sync_all.py --check

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "All files in sync"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html index_en.html README_EN.md
            git commit -m "auto: sync all files from README.md [skip ci]"
            git push
          fi
