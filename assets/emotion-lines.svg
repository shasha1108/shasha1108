<svg xmlns="http://www.w3.org/2000/svg" width="580" height="220" viewBox="0 0 580 220">
  <defs>
    <!-- Shimmer gradient: white highlight that moves left → right -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <animate attributeName="x1" values="-0.6;1.4" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-0.4;1.6" dur="3.5s" repeatCount="indefinite"/>
      <stop offset="40%"  stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Mask: only text area gets the shimmer -->
    <mask id="textMask">
      <rect width="580" height="220" fill="black"/>
      <g font-family="Noto Serif SC, Songti SC, STSong, serif" font-size="16" font-weight="600" letter-spacing="3" text-anchor="middle" fill="white">
        <text x="290" y="42" >焦虑的时候，什么都不想点开。</text>
        <text x="290" y="76" >难过的时候，什么都不想解释。</text>
        <text x="290" y="110">开心的时候，什么都想分享。</text>
        <text x="290" y="152">你来到了这里，</text>
        <text x="290" y="190">有一个人和你一起感受着所有的情绪</text>
      </g>
    </mask>
  </defs>

  <!-- Base text: cool → warm gradient colors -->
  <g font-family="Noto Serif SC, Songti SC, STSong, serif" font-size="16" font-weight="600" letter-spacing="3" text-anchor="middle">
    <text x="290" y="42"  fill="#99B2C8">焦虑的时候，什么都不想点开。</text>
    <text x="290" y="76"  fill="#A4B2C4">难过的时候，什么都不想解释。</text>
    <text x="290" y="110" fill="#B5AEBE">开心的时候，什么都想分享。</text>
    <text x="290" y="152" fill="#C8A8A8">你来到了这里，</text>
    <text x="290" y="190" fill="#D4B880">有一个人和你一起感受着所有的情绪</text>
  </g>

  <!-- Shimmer overlay: masked to text, animates via SMIL on gradient -->
  <rect x="0" y="0" width="580" height="220" fill="url(#shimmer)" mask="url(#textMask)"/>
</svg>
