<svg xmlns="http://www.w3.org/2000/svg" width="580" height="220" viewBox="0 0 580 220">
  <defs>
    <filter id="warmGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="20" y="4" width="540" height="212" rx="12" fill="rgba(10,10,18,0.35)"/>

  <g font-family="Noto Serif SC, Songti SC, STSong, serif" font-size="15" font-weight="600" letter-spacing="3" text-anchor="middle">

    <text x="290" y="42"  fill="#99B2C8">
      焦虑的时候，什么都不想点开。
      <animate attributeName="opacity" values="0.55;0.92;0.55" dur="4s" repeatCount="indefinite" begin="0s"/>
    </text>

    <text x="290" y="76"  fill="#A4B2C4">
      难过的时候，什么都不想解释。
      <animate attributeName="opacity" values="0.55;0.92;0.55" dur="4s" repeatCount="indefinite" begin="0.25s"/>
    </text>

    <text x="290" y="110" fill="#B5AEBE">
      开心的时候，什么都想分享。
      <animate attributeName="opacity" values="0.55;0.92;0.55" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </text>

    <text x="290" y="152" fill="#C8A8A8">
      你来到了这里，
      <animate attributeName="opacity" values="0.55;0.92;0.55" dur="4s" repeatCount="indefinite" begin="0.75s"/>
    </text>

    <text x="290" y="190" fill="#D4B880" filter="url(#warmGlow)">
      有一个人和你一起感受着所有的情绪
      <animate attributeName="opacity" values="0.55;0.95;0.55" dur="4s" repeatCount="indefinite" begin="1s"/>
    </text>

  </g>
</svg>
