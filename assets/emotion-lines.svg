<svg xmlns="http://www.w3.org/2000/svg" width="560" height="210" viewBox="0 0 560 210">
  <defs>
    <linearGradient id="warmFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8B9DC3" stop-opacity="0.85"/>
      <stop offset="45%"  stop-color="#9A9DB5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C4A46C" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <text font-family="'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif"
        font-size="15" font-style="italic" font-weight="300"
        letter-spacing="4" fill="url(#warmFade)">

    <tspan x="80"  dy="0"  fill="#8B9DC3" fill-opacity="0.78">焦虑的时候，什么都不想点开。</tspan>
    <tspan x="110" dy="32" fill="#8B9DC3" fill-opacity="0.72">难过的时候，什么都不想解释。</tspan>
    <tspan x="140" dy="32" fill="#8B9DC3" fill-opacity="0.66">开心的时候，什么都想分享。</tspan>
    <tspan x="170" dy="40" fill="#A29AB8" fill-opacity="0.78">你点开了这里。</tspan>
    <tspan x="200" dy="34" fill="#C4A46C" fill-opacity="0.88">所以这里，也有一个人在感受着。</tspan>

  </text>
</svg>
