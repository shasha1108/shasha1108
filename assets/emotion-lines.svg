<svg xmlns="http://www.w3.org/2000/svg" width="580" height="220" viewBox="0 0 580 220">
  <defs>
    <filter id="warmGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Shimmer sweep gradient -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="white" stop-opacity="0">
        <animate attributeName="offset" values="-0.4;1.2" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0%"   stop-color="white" stop-opacity="0.35">
        <animate attributeName="offset" values="-0.3;1.3" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0%"   stop-color="white" stop-opacity="0">
        <animate attributeName="offset" values="-0.2;1.4" dur="3.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <mask id="textMask">
      <rect width="580" height="220" fill="black"/>
      <g font-family="Noto Serif SC, Songti SC, STSong, serif" font-size="15" font-weight="600" letter-spacing="3" text-anchor="middle" fill="white">
        <text x="290" y="42" >焦虑的时候，什么都不想点开。</text>
        <text x="290" y="76" >难过的时候，什么都不想解释。</text>
        <text x="290" y="110">开心的时候，什么都想分享。</text>
        <text x="290" y="152">你来到了这里，</text>
        <text x="290" y="190">有一个人和你一起感受着所有的情绪</text>
      </g>
    </mask>
  </defs>

  <!-- Base text (cold→warm colors) -->
  <g font-family="Noto Serif SC, Songti SC, STSong, serif" font-size="15" font-weight="600" letter-spacing="3" text-anchor="middle">
    <text x="290" y="42"  fill="#99B2C8">焦虑的时候，什么都不想点开。</text>
    <text x="290" y="76"  fill="#A4B2C4">难过的时候，什么都不想解释。</text>
    <text x="290" y="110" fill="#B5AEBE">开心的时候，什么都想分享。</text>
    <text x="290" y="152" fill="#C8A8A8">你来到了这里，</text>
    <text x="290" y="190" fill="#D4B880" filter="url(#warmGlow)">有一个人和你一起感受着所有的情绪</text>
  </g>

  <!-- Shimmer sweep layer (masked to text only) -->
  <rect x="0" y="0" width="580" height="220" fill="url(#shimmer)" mask="url(#textMask)" opacity="0.6"/>
</svg>
