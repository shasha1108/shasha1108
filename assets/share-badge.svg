<svg xmlns="http://www.w3.org/2000/svg" width="240" height="52" viewBox="0 0 240 52">
  <defs>
    <!-- Glass fill gradient: pale mint → soft aqua -->
    <linearGradient id="glassFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e0f4f0" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#c8ece4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b4e3dc" stop-opacity="0.50"/>
    </linearGradient>

    <!-- Glass shine: top highlight -->
    <linearGradient id="glassShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Border: subtle teal ring -->
    <linearGradient id="glassBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a0d8d0" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#8cc8c0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a0d8d0" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7ab8b0" flood-opacity="0.18"/>
    </filter>

    <!-- Inner glow -->
    <filter id="innerGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="1" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>

  <!-- Pill background with glass fill -->
  <rect x="0" y="0" width="240" height="52" rx="26" ry="26"
        fill="url(#glassFill)" stroke="url(#glassBorder)" stroke-width="1.2"
        filter="url(#softShadow)"/>

  <!-- Glass shine overlay -->
  <rect x="2" y="2" width="236" height="26" rx="24" ry="24"
        fill="url(#glassShine)" stroke="none"/>

  <!-- Decorative dots: left -->
  <circle cx="24"  cy="26" r="2.2" fill="#7ab8b0" opacity="0.7"/>
  <circle cx="33"  cy="26" r="1.2" fill="#8cc8c0" opacity="0.4"/>

  <!-- Text: share -->
  <text x="120" y="30" text-anchor="middle"
        font-family="'Noto Serif SC', 'Songti SC', Georgia, serif"
        font-size="14" font-weight="300" letter-spacing="5"
        fill="#3a6a64" opacity="0.85">
    分 享 主 页
  </text>

  <!-- Arrow -->
  <line x1="163" y1="26" x2="183" y2="26" stroke="#5a9a8a" stroke-width="1.2" opacity="0.7"/>
  <line x1="179" y1="21" x2="186" y2="26" stroke="#5a9a8a" stroke-width="1.2" opacity="0.7"/>
  <line x1="179" y1="31" x2="186" y2="26" stroke="#5a9a8a" stroke-width="1.2" opacity="0.7"/>

  <!-- Decorative dots: right -->
  <circle cx="206" cy="26" r="1.2" fill="#8cc8c0" opacity="0.4"/>
  <circle cx="215" cy="26" r="2.2" fill="#7ab8b0" opacity="0.7"/>

</svg>
